# ========================================
# Nginx Reverse Proxy Configuration
# ========================================
# Deploy Nginx in the frontend Pod to proxy API calls
# to internal Kubernetes services using DNS

server {
    listen 80;

    # Serve the React frontend (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;   # SPA fallback
    }

    # Proxy API calls to the Users API (ClusterIP Service)
    location /api/users {
        proxy_pass http://users-service:8080/users;    # K8s DNS!
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API calls to the Tasks API (ClusterIP Service)
    location /api/tasks {
        proxy_pass http://tasks-service:8000/tasks;    # K8s DNS!
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
