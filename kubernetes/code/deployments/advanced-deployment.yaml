# Advanced Deployment with Rolling Update Strategy, Liveness Probe, and Resource Limits
apiVersion: apps/v1
kind: Deployment
metadata:
  name: advanced-app-deployment
  labels:
    app: advanced-app
    environment: production
    team: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: advanced-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1              # At most 1 extra Pod during update
      maxUnavailable: 0        # Never have fewer than desired Pods
  template:
    metadata:
      labels:
        app: advanced-app
        environment: production
    spec:
      containers:
        - name: advanced-node
          image: academind/kub-first-app:2
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          # Resource requests & limits
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          # Liveness Probe — restart container if unhealthy
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2

          # Readiness Probe — only send traffic when ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          # Environment Variables
          env:
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
