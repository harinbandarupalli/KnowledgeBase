# ========================================
# Liveness & Readiness Probe Examples
# ========================================
# Liveness Probe  → Is the container alive? If not → RESTART it
# Readiness Probe → Is the container ready for traffic? If not → REMOVE from Service endpoints

apiVersion: apps/v1
kind: Deployment
metadata:
  name: probes-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: probes-demo
  template:
    metadata:
      labels:
        app: probes-demo
    spec:
      containers:
        - name: web
          image: academind/kub-first-app:2
          ports:
            - containerPort: 8080

          # ============================
          # HTTP GET Liveness Probe
          # ============================
          # Sends an HTTP GET request to /healthz on port 8080
          # Success: 2xx or 3xx response
          # Failure: anything else or timeout
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15   # Wait 15s after container starts
            periodSeconds: 10         # Check every 10 seconds
            failureThreshold: 3       # Restart after 3 consecutive failures
            timeoutSeconds: 2         # Each probe times out after 2s
            successThreshold: 1       # 1 success to be considered healthy again

          # ============================
          # HTTP GET Readiness Probe
          # ============================
          # Same mechanism as liveness but doesn't restart —
          # instead removes Pod from Service endpoints
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

---
