---
# ========================================
# Exec Command Probe Example
# ========================================
# Runs a command inside the container
# Success: exit code 0
# Failure: non-zero exit code

# apiVersion: apps/v1
# kind: Deployment
# ...
#     spec:
#       containers:
#         - name: app
#           image: my-custom-app
#           livenessProbe:
#             exec:
#               command:
#                 - cat
#                 - /tmp/healthy      # File exists = healthy
#             initialDelaySeconds: 5
#             periodSeconds: 5

# ========================================
# Probe Parameters Reference
# ========================================
# initialDelaySeconds (default: 0)     — Seconds before first probe
# periodSeconds       (default: 10)    — How often to probe
# timeoutSeconds      (default: 1)     — Timeout for each probe
# successThreshold    (default: 1)     — Consecutive successes after failure
# failureThreshold    (default: 3)     — Consecutive failures before action
